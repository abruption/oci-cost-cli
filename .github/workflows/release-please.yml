name: Release

# Fully automated releases via release-please:
#  1. Every push to master (i.e. every develop -> master PR merge) updates a
#     "release PR" (version bump + CHANGELOG from Conventional Commits).
#  2. Merging that PR creates the GitHub Release + tag, then this same run
#     publishes to npm with provenance.
# No manual `npm version` needed. Only runs off master — develop and
# feat/fix/docs/chore branches never trigger a release.
on:
  push:
    branches: [master]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write # npm provenance (OIDC)
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # The steps below run only when a release was just created (release PR merged).
      - uses: actions/checkout@v7
        if: ${{ steps.release.outputs.release_created }}

      - uses: actions/setup-node@v6
        if: ${{ steps.release.outputs.release_created }}
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - if: ${{ steps.release.outputs.release_created }}
        run: npm ci
      - if: ${{ steps.release.outputs.release_created }}
        run: npm test
      - if: ${{ steps.release.outputs.release_created }}
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
